{% extends 'base.html' %}

{% block title %}Добави нов продукт{% endblock %}

{% block content %}
<main class="form-container">
    <form class="form" method="POST" enctype="multipart/form-data" action="{{ url_for('main.add_product') }}">
        <label for="name">Име:</label>
        <input type="text" id="name" name="name" required>

        <label for="description">Описание:</label>
        <textarea id="description" name="description"></textarea>

        <label for="price">Цена:</label>
        <input type="number" id="price" name="price" step="0.01" required>

        <label for="category">Категория:</label>
        <input type="text" id="category" name="category">

        <label for="stock">Наличност:</label>
        <input type="number" id="stock" name="stock" value="0">

        <label for="image_url">URL на снимка (по избор):</label>
        <input type="text" id="image_url" name="image_url">

        <label for="image_file">Качи снимка от компютър:</label>
        <input type="file" id="image_file" name="image_file" accept="image/*">

        <!-- Превю на избраното изображение -->
        <div id="imagePreviewContainer">
            <img id="imagePreview" src="#" alt="Преглед на снимката" style="display: none;">
        </div>

        <input class="submit" type="submit" value="Добави">
    </form>
</main>

<script>
    document.getElementById("image_file").addEventListener("change", function () {
        const file = this.files[0];
        const preview = document.getElementById("imagePreview");

        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = "block";
            };
            reader.readAsDataURL(file);
        } else {
            preview.src = "#";
            preview.style.display = "none";
        }
    });
</script>
{% endblock %}
